{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0 h-100">
            <div class="card-header bg-primary text-white fw-bold">🤖 College Assistant Bot</div>
            <div class="card-body" id="chat-box" style="height: 400px; overflow-y: auto; background-color: #f8f9fa;">
                <div class="mb-3 text-start"><span class="badge bg-secondary p-2 fs-6">Hello! Ask me about courses, fees, hostels, or placements.</span></div>
            </div>
            <div class="card-footer">
                <div class="input-group">
                    <input type="text" id="user-input" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function sendMessage() {
        const input = document.getElementById('user-input');
        const message = input.value;
        if (!message) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="mb-3 text-end"><span class="badge bg-primary p-2 fs-6">${message}</span></div>`;
        input.value = '';
        fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: message}) })
        .then(res => res.json())
        .then(data => {
            chatBox.innerHTML += `<div class="mb-3 text-start"><span class="badge bg-secondary p-2 fs-6">${data.reply}</span></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }
</script>
{% endblock %}
